<svg width="900" height="200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a2e"/>
    </radialGradient>
    <style>
      .star { animation: twinkle 3s infinite alternate; }
      @keyframes twinkle { from { opacity: 0.2; } to { opacity: 1; } }
      .name { font: bold 42px 'Segoe UI', sans-serif; fill: #e6edf3; letter-spacing: 2px; }
      .title { font: 18px 'Segoe UI', sans-serif; fill: #7ee8fa; }
      .dot { animation: pulse 2s infinite; }
      @keyframes pulse { 0%,100% { r: 2; opacity: 0.6; } 50% { r: 4; opacity: 1; } }
    </style>
  </defs>
  <rect width="900" height="200" fill="url(#bg)" rx="12"/>
  <!-- Stars -->
  <circle class="star" cx="50" cy="30" r="1.5" fill="#fff" style="animation-delay:0s"/>
  <circle class="star" cx="120" cy="60" r="1" fill="#7ee8fa" style="animation-delay:0.5s"/>
  <circle class="star" cx="200" cy="20" r="1.5" fill="#fff" style="animation-delay:1s"/>
  <circle class="star" cx="300" cy="50" r="1" fill="#fff" style="animation-delay:0.3s"/>
  <circle class="star" cx="450" cy="15" r="2" fill="#7ee8fa" style="animation-delay:0.8s"/>
  <circle class="star" cx="600" cy="40" r="1.5" fill="#fff" style="animation-delay:1.2s"/>
  <circle class="star" cx="700" cy="20" r="1" fill="#fff" style="animation-delay:0.2s"/>
  <circle class="star" cx="800" cy="55" r="1.5" fill="#7ee8fa" style="animation-delay:0.6s"/>
  <circle class="star" cx="860" cy="25" r="1" fill="#fff" style="animation-delay:1.5s"/>
  <circle class="star" cx="750" cy="70" r="1" fill="#fff" style="animation-delay:0.4s"/>
  <circle class="star" cx="80" cy="130" r="1" fill="#fff" style="animation-delay:1.8s"/>
  <circle class="star" cx="650" cy="160" r="1.5" fill="#7ee8fa" style="animation-delay:0.9s"/>
  <circle class="star" cx="820" cy="140" r="1" fill="#fff" style="animation-delay:1.1s"/>
  <!-- Orbit line -->
  <ellipse cx="450" cy="100" rx="320" ry="60" fill="none" stroke="#7ee8fa" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.3"/>
  <!-- Planet -->
  <circle cx="130" cy="100" r="18" fill="#1e3a5f" stroke="#7ee8fa" stroke-width="1.5"/>
  <circle cx="125" cy="94" r="5" fill="#7ee8fa" opacity="0.4"/>
  <!-- Text -->
  <text x="450" y="95" text-anchor="middle" class="name">Tejaswini Keerthi</text>
  <text x="450" y="128" text-anchor="middle" class="title">Data · ML · AI Engineer · Northeastern University</text>
  <!-- Pulsing dots -->
  <circle class="dot" cx="240" cy="128" r="2" fill="#7ee8fa"/>
  <circle class="dot" cx="660" cy="128" r="2" fill="#7ee8fa" style="animation-delay:1s"/>
</svg>
