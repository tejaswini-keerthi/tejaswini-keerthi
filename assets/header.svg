  <!-- Subtitle -->
  <text x="450" y="118" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="13" fill="#92effd" letter-spacing="2">DATA · ML · AI ENGINEER  |  NORTHEASTERN UNIVERSITY</text>
