      <stop offset="0%" style="stop-color:#00c9ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00c9ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#92effd;stop-opacity:0"/>
